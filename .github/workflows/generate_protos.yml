name: Generate Go Proto Files

on:
  push:
    branches:
      - main
    paths:
      - 'server/proto/**.proto'
  workflow_dispatch:

defaults:
  run:
    working-directory: server/proto

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out sources
        uses: actions/checkout@v2
      - name: Set up Go environment
        uses: actions/setup-go@v2
        with:
          go-version: '^1.22'
      - name: Download Go modules
        run: go mod download
      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v1
        with:
          version: '3.x'
      - name: Set up Protobuf Compiler in Go environment
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.26
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.1
      - name: Build protos
        run: |
          ./buildprotos.sh
      - name: Check for changes
        id: git-check
        run: |
          CHANGES=$(git status --porcelain -- **.pb.go)
          if [[ -n "$CHANGES" ]]; then
            echo "Found changes:"
            echo "$CHANGES"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes found for **.pb.go"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        if: steps.git-check.outputs.changed == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automatically update generated Go proto files"
          title: "Automatically update generated Go proto files"
          body: |
            This PR was auto-generated by the "Generate Go Proto Files" workflow
            to update the Go protobuf files based on the latest `.proto` definitions.

            Please review the changes and merge if appropriate.
          branch: automated/update-protos
          base: main
          add-paths: |
            **.pb.go

